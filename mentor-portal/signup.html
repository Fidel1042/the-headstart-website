<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Create account – Headstart Mentor Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <main class="auth-wrap">
    <a href="./" class="auth-logo" aria-label="Mentor portal home">
      <img src="../images/headstart-italic-logo.png" alt="The Headstart" />
    </a>

    <h1>Create your mentor account</h1>
    <p class="auth-sub">Pre-approved emails only. If your email isn't on the allowlist, you won't be able to sign up — contact Fidel.</p>

    <div id="error-banner" class="auth-error" hidden></div>
    <div id="info-banner" class="auth-info" hidden></div>

    <button class="oauth-btn" id="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#EA4335" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/>
        <path fill="#4285F4" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/>
        <path fill="#FBBC05" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"/>
      </svg>
      <span>Sign up with Google</span>
    </button>

    <div class="auth-divider"><span>or</span></div>

    <form id="signup-form" class="auth-form" novalidate>
      <label class="auth-field">
        <span>Email</span>
        <input type="email" name="email" autocomplete="email" required />
      </label>
      <label class="auth-field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="new-password" required minlength="8" />
      </label>
      <label class="auth-field">
        <span>Confirm password</span>
        <input type="password" name="confirm" autocomplete="new-password" required minlength="8" />
      </label>
      <button class="auth-primary" type="submit" id="signup-submit">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="login.html" id="login-link">Sign in</a>
    </p>
  </main>

  <script type="module">
    import { supabase, isAllowedEmail, getSession } from "./auth.js";

    const params = new URLSearchParams(window.location.search);
    const nextPath = params.get("next") || "./";

    // If already signed in, skip signup
    const existing = await getSession();
    if (existing) {
      window.location.replace(nextPath);
    }

    const errorBanner = document.getElementById("error-banner");
    const infoBanner = document.getElementById("info-banner");
    function showError(msg) { errorBanner.textContent = msg; errorBanner.hidden = false; }
    function clearError() { errorBanner.hidden = true; errorBanner.textContent = ""; }
    function showInfo(msg) { infoBanner.textContent = msg; infoBanner.hidden = false; }

    document.getElementById("login-link").href =
      `login.html?next=${encodeURIComponent(nextPath)}`;

    // Email/password signup
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      const submit = document.getElementById("signup-submit");
      const fd = new FormData(e.target);
      const email = String(fd.get("email") || "").trim();
      const password = String(fd.get("password") || "");
      const confirm = String(fd.get("confirm") || "");

      if (password !== confirm) {
        showError("Passwords don't match.");
        return;
      }
      if (!isAllowedEmail(email)) {
        showError("This email isn't on the mentor allowlist. Contact Fidel to be added.");
        return;
      }

      submit.disabled = true;
      submit.textContent = "Creating account…";
      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: `${window.location.origin}/mentor-portal/` },
      });
      submit.disabled = false;
      submit.textContent = "Create account";

      if (error) {
        showError(error.message || "Could not create account.");
        return;
      }
      // Supabase by default sends a confirmation email
      if (data.session) {
        window.location.replace(nextPath);
      } else {
        showInfo("Check your email to confirm your account. Once confirmed, sign in.");
      }
    });

    // Google OAuth
    document.getElementById("google-btn").addEventListener("click", async () => {
      clearError();
      const redirectTo = `${window.location.origin}/mentor-portal/?next=${encodeURIComponent(nextPath)}`;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo },
      });
      if (error) showError(error.message);
    });
  </script>

</body>
</html>
