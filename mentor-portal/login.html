<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Sign in – Headstart Mentor Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <main class="auth-wrap">
    <a href="./" class="auth-logo" aria-label="Mentor portal home">
      <img src="../images/headstart-italic-logo.png" alt="The Headstart" />
    </a>

    <h1>Sign in</h1>
    <p class="auth-sub">Mentor portal access only.</p>

    <div id="error-banner" class="auth-error" hidden></div>

    <button class="oauth-btn" id="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#EA4335" d="M9 3.48c1.69 0 2.83.73 3.48 1.34l2.54-2.48C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.96l2.91 2.26C4.6 5.05 6.62 3.48 9 3.48z"/>
        <path fill="#4285F4" d="M17.64 9.2c0-.74-.06-1.28-.19-1.84H9v3.34h4.96c-.1.83-.64 2.08-1.84 2.92l2.84 2.2c1.7-1.57 2.68-3.88 2.68-6.62z"/>
        <path fill="#FBBC05" d="M3.88 10.78A5.54 5.54 0 0 1 3.58 9c0-.62.11-1.22.29-1.78L.96 4.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l2.92-2.26z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.2c-.76.53-1.78.9-3.12.9-2.38 0-4.4-1.57-5.12-3.74L.97 13.04C2.45 15.98 5.48 18 9 18z"/>
      </svg>
      <span>Continue with Google</span>
    </button>

    <div class="auth-divider"><span>or</span></div>

    <form id="login-form" class="auth-form" novalidate>
      <label class="auth-field">
        <span>Email</span>
        <input type="email" name="email" autocomplete="email" required />
      </label>
      <label class="auth-field">
        <span>Password</span>
        <input type="password" name="password" autocomplete="current-password" required minlength="6" />
      </label>
      <button class="auth-primary" type="submit" id="login-submit">Sign in</button>
    </form>

    <p class="auth-footer">
      New mentor? <a href="signup.html" id="signup-link">Create an account</a>
    </p>
  </main>

  <script type="module">
    import { supabase, getSession } from "./auth.js";

    const params = new URLSearchParams(window.location.search);
    const nextPath = params.get("next") || "./";
    const errParam = params.get("error");

    const errorBanner = document.getElementById("error-banner");
    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.hidden = false;
    }
    function clearError() {
      errorBanner.hidden = true;
      errorBanner.textContent = "";
    }
    if (errParam) showError(errParam);

    // If already signed in, skip login
    const existing = await getSession();
    if (existing) {
      window.location.replace(nextPath);
    }

    // Preserve `next` on the signup link
    document.getElementById("signup-link").href =
      `signup.html?next=${encodeURIComponent(nextPath)}`;

    // Email/password sign-in
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      const submit = document.getElementById("login-submit");
      submit.disabled = true;
      submit.textContent = "Signing in…";
      const fd = new FormData(e.target);
      const email = String(fd.get("email") || "").trim();
      const password = String(fd.get("password") || "");
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      submit.disabled = false;
      submit.textContent = "Sign in";
      if (error) {
        showError(error.message || "Could not sign in. Check your email and password.");
        return;
      }
      window.location.replace(nextPath);
    });

    // Google OAuth
    document.getElementById("google-btn").addEventListener("click", async () => {
      clearError();
      const redirectTo = `${window.location.origin}/mentor-portal/?next=${encodeURIComponent(nextPath)}`;
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo },
      });
      if (error) showError(error.message);
    });
  </script>

</body>
</html>
