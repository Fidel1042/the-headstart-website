<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Netlify Forms Registry</title>
  <meta name="robots" content="noindex,nofollow" />
</head>
<body>
  <div hidden aria-hidden="true">
    <form name="mentor-application" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="mentor-application" />
      <input type="hidden" name="application_role" value="Early Career Mentor" />
      <input type="text" name="applicant_name" />
      <input type="email" name="applicant_email" />
      <input type="text" name="phone_country" />
      <input type="tel" name="applicant_phone" />
      <input type="url" name="applicant_linkedin" />
      <input type="file" name="resume" />
      <input type="text" name="bot-field" />
    </form>

    <form name="marketing-intern-application" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="marketing-intern-application" />
      <input type="hidden" name="application_role" value="Marketing Intern" />
      <input type="text" name="applicant_name" />
      <input type="email" name="applicant_email" />
      <input type="text" name="phone_country" />
      <input type="tel" name="applicant_phone" />
      <input type="url" name="applicant_linkedin" />
      <input type="url" name="portfolio_link" />
      <input type="file" name="resume" />
      <input type="text" name="bot-field" />
    </form>

    <form name="strategy-intern-application" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="strategy-intern-application" />
      <input type="hidden" name="application_role" value="Strategy Intern" />
      <input type="text" name="applicant_name" />
      <input type="email" name="applicant_email" />
      <input type="text" name="phone_country" />
      <input type="tel" name="applicant_phone" />
      <input type="url" name="applicant_linkedin" />
      <input type="file" name="resume" />
      <input type="text" name="bot-field" />
    </form>
  </div>
</body>
</html>
