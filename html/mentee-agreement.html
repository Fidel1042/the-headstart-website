<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SMH2KVMJT2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-SMH2KVMJT2");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mentee Agreement | Headstart Mentoring</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #ffffff;
      --border: rgba(255,255,255,0.2);
      --panel: rgba(255,255,255,0.035);
      --gold-gradient: linear-gradient(90deg, #fdf5c4 0%, #f7d37d 35%, #c08a2d 68%, #ffeb9f 100%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    .agreement-shell {
      width: min(980px, 92vw);
      margin: 3.6rem auto 2.8rem;
      padding: 0;
    }

    .agreement-hero {
      margin-bottom: 1.1rem;
    }

    .agreement-hero h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.4vw, 2.5rem);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .agreement-hero h1 .gold {
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agreement-hero .subtitle {
      margin: 0.8rem 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .agreement-inline-link {
      color: #f7d37d;
      font-weight: 700;
      text-underline-offset: 3px;
    }

    .agreement-inline-link:hover,
    .agreement-inline-link:focus-visible {
      color: #ffeb9f;
    }

    .agreement-sign {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      padding: 1.15rem 1.1rem 1.15rem;
    }

    .agreement-sign-note {
      margin: 0 0 0.9rem;
      color: #ffffff;
      font-weight: 600;
    }

    .agreement-form {
      display: grid;
      gap: 0.9rem;
    }

    .agreement-form label {
      display: block;
      margin: 0 0 0.35rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
    }

    .agreement-form input[type="text"],
    .agreement-form input[type="date"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.24);
      background: #060606;
      color: #fff;
      padding: 0.75rem 0.85rem;
      font-size: 0.95rem;
      outline: none;
    }

    .agreement-form input[type="text"]:focus,
    .agreement-form input[type="date"]:focus {
      border-color: rgba(247,211,125,0.88);
      box-shadow: 0 0 0 2px rgba(247,211,125,0.2);
    }

    .field-error {
      min-height: 1.1em;
      margin: 0.28rem 0 0;
      color: #ffb6b6;
      font-size: 0.82rem;
    }

    .agreement-check {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: #ffffff;
      cursor: pointer;
    }

    .agreement-check input {
      margin-top: 0.15rem;
      accent-color: #f7d37d;
    }

    .agreement-submit {
      border: none;
      border-radius: 999px;
      background: var(--gold-gradient);
      color: #2b1b09;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 800;
      padding: 0.72rem 1rem;
      cursor: pointer;
    }

    .agreement-submit:hover {
      filter: brightness(1.05);
    }

    .honeypot {
      display: none;
      visibility: hidden;
      position: absolute;
      left: -9999px;
    }

    @media (max-width: 768px) {
      .agreement-shell {
        width: min(980px, 94vw);
        margin: 1.9rem auto 2rem;
      }

      .agreement-sign {
        border-radius: 14px;
        padding: 1rem 0.9rem;
      }

      .agreement-hero {
        margin-bottom: 0.95rem;
      }

      .agreement-hero .subtitle,
      .agreement-sign-note {
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .agreement-form {
        gap: 0.8rem;
      }

      .agreement-form label {
        font-size: 0.92rem;
      }

      .agreement-form input[type="text"],
      .agreement-form input[type="date"] {
        font-size: 16px;
        padding: 0.72rem 0.78rem;
      }

      .agreement-submit {
        width: 100%;
        padding: 0.76rem 1rem;
      }
    }

    @media (max-width: 430px) {
      .agreement-shell {
        margin-top: 1.4rem;
      }

      .agreement-hero h1 {
        font-size: clamp(1.45rem, 7.8vw, 1.9rem);
      }

    }
  </style>
</head>
<body>
  <main class="agreement-shell">
    <section class="agreement-sign">
      <header class="agreement-hero">
        <h1><span class="gold">Congratulations</span>, you have qualified to be a mentee!</h1>
        <p class="subtitle">
          Please review the agreement
          <a
            class="agreement-inline-link"
            id="open-agreement-popup"
            href="/mentee-agreement-popup"
            target="_blank"
            rel="noopener"
          >
            here
          </a>.
        </p>
      </header>

      <p class="agreement-sign-note">By signing below, you agree to all terms in the Mentee Agreement.</p>
      <p class="field-error" id="agreement-open-error" aria-live="polite"></p>

      <form
        class="agreement-form"
        id="mentee-agreement-form"
        name="mentee-agreement"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
        action="/mentee-agreement-submitted"
      >
        <input type="hidden" name="form-name" value="mentee-agreement" />
        <input type="hidden" name="agreement_version" value="v1.0 (17/03/2026)" />
        <input type="hidden" name="signature" id="signature-value" />

        <p class="honeypot">
          <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
        </p>

        <div>
          <label for="full-name">Full Name (required)</label>
          <input type="text" id="full-name" name="full_name" autocomplete="name" required />
        </div>

        <div>
          <label for="signature-typed">Signature (required)</label>
          <input type="text" id="signature-typed" autocomplete="off" placeholder="Type your full name as your signature" />
          <p class="field-error" id="signature-error" aria-live="polite"></p>
        </div>

        <div>
          <label for="agreement-date">Date (required)</label>
          <input type="date" id="agreement-date" name="date_signed" required />
        </div>

        <label class="agreement-check">
          <input type="checkbox" name="agreement_acknowledgement" required />
          <span>I have read, understood, and agree to the Mentee Agreement</span>
        </label>

        <button class="agreement-submit" type="submit">Submit Agreement</button>
      </form>
    </section>
  </main>

  <script>
    (function () {
      const popupTrigger = document.getElementById("open-agreement-popup");
      const agreementOpenError = document.getElementById("agreement-open-error");
      let agreementWasOpened = false;
      if (popupTrigger) {
        popupTrigger.addEventListener("click", (event) => {
          event.preventDefault();
          const isMobileViewport = window.matchMedia("(max-width: 768px)").matches;
          if (isMobileViewport) {
            const mobileTab = window.open(popupTrigger.href, "_blank", "noopener");
            if (mobileTab) {
              agreementWasOpened = true;
              if (agreementOpenError) agreementOpenError.textContent = "";
            }
            return;
          }

          const maxWidth = Math.max(360, window.screen.availWidth - 24);
          const maxHeight = Math.max(520, window.screen.availHeight - 24);
          const width = Math.min(maxWidth, Math.max(560, Math.round(window.screen.availWidth * 0.55)));
          const height = Math.min(maxHeight, Math.max(640, Math.round(window.screen.availHeight * 0.86)));
          const left = Math.max(0, Math.round((window.screen.availWidth - width) / 2));
          const top = Math.max(0, Math.round((window.screen.availHeight - height) / 2));
          const features = `popup=yes,width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`;
          const popup = window.open(popupTrigger.href, "headstartMenteeAgreementPopup", features);
          if (popup && !popup.closed) {
            agreementWasOpened = true;
            if (agreementOpenError) agreementOpenError.textContent = "";
            popup.focus();
          } else {
            window.open(popupTrigger.href, "_blank", "noopener");
          }
        });
      }

      const form = document.getElementById("mentee-agreement-form");
      if (!form) return;

      const dateField = document.getElementById("agreement-date");
      if (dateField && !dateField.value) {
        const now = new Date();
        const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        dateField.value = local.toISOString().split("T")[0];
      }

      const signatureValue = document.getElementById("signature-value");
      const typedField = document.getElementById("signature-typed");
      const errorField = document.getElementById("signature-error");

      form.addEventListener("submit", (event) => {
        if (!agreementWasOpened) {
          event.preventDefault();
          if (agreementOpenError) agreementOpenError.textContent = "Please open the agreement by clicking \"here\" before submitting.";
          if (popupTrigger) popupTrigger.focus();
          return;
        }

        if (errorField) errorField.textContent = "";

        const validSignature = (typedField.value || "").trim();
        if (!validSignature) {
          event.preventDefault();
          if (errorField) errorField.textContent = "Please type your signature before submitting.";
          typedField.focus();
          return;
        }

        signatureValue.value = validSignature;
      });
    })();
  </script>
</body>
</html>
