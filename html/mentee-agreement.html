<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SMH2KVMJT2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-SMH2KVMJT2");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mentee Agreement | Headstart Mentoring</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #ffffff;
      --border: rgba(255,255,255,0.2);
      --panel: rgba(255,255,255,0.035);
      --gold-gradient: linear-gradient(90deg, #fdf5c4 0%, #f7d37d 35%, #c08a2d 68%, #ffeb9f 100%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.6;
    }

    .agreement-shell {
      width: min(980px, 92vw);
      margin: 3.6rem auto 2.8rem;
      padding: 0;
    }

    .agreement-hero {
      margin-bottom: 1.1rem;
    }

    .agreement-hero h1 {
      margin: 0;
      font-size: clamp(1.8rem, 3.4vw, 2.5rem);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .agreement-hero h1 .gold {
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .agreement-hero .subtitle {
      margin: 0.8rem 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .agreement-inline-link {
      color: #f7d37d;
      font-weight: 700;
      text-underline-offset: 3px;
    }

    .agreement-inline-link:hover,
    .agreement-inline-link:focus-visible {
      color: #ffeb9f;
    }

    .agreement-sign {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      padding: 1.15rem 1.1rem 1.15rem;
    }

    .agreement-sign-note {
      margin: 0 0 0.9rem;
      color: #ffffff;
      font-weight: 600;
    }

    .agreement-form {
      display: grid;
      gap: 0.9rem;
    }

    .agreement-form label {
      display: block;
      margin: 0 0 0.35rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
    }

    .agreement-form input[type="text"],
    .agreement-form input[type="date"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.24);
      background: #060606;
      color: #fff;
      padding: 0.75rem 0.85rem;
      font-size: 0.95rem;
      outline: none;
    }

    .agreement-form input[type="text"]:focus,
    .agreement-form input[type="date"]:focus {
      border-color: rgba(247,211,125,0.88);
      box-shadow: 0 0 0 2px rgba(247,211,125,0.2);
    }

    .field-error {
      min-height: 1.1em;
      margin: 0.28rem 0 0;
      color: #ffb6b6;
      font-size: 0.82rem;
    }

    .agreement-check {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: #ffffff;
      cursor: pointer;
    }

    .agreement-check input {
      margin-top: 0.15rem;
      accent-color: #f7d37d;
    }

    .agreement-submit {
      border: none;
      border-radius: 999px;
      background: var(--gold-gradient);
      color: #2b1b09;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      font-weight: 800;
      padding: 0.72rem 1rem;
      cursor: pointer;
    }

    .agreement-submit:hover {
      filter: brightness(1.05);
    }

    .honeypot {
      display: none;
      visibility: hidden;
      position: absolute;
      left: -9999px;
    }

    .card-section {
      margin-top: 0.2rem;
    }

    .card-section-title {
      display: block;
      margin: 0 0 0.45rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #ffffff;
    }

    #card-element {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.24);
      background: #060606;
      padding: 0.85rem 0.9rem;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    #card-element.StripeElement--focus {
      border-color: rgba(247,211,125,0.88);
      box-shadow: 0 0 0 2px rgba(247,211,125,0.2);
    }

    #card-element.StripeElement--invalid {
      border-color: rgba(255,182,182,0.6);
    }

    .card-trust {
      margin: 0.55rem 0 0;
      font-size: 0.88rem;
      line-height: 1.5;
      color: #ffffff;
    }

    .agreement-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .agreement-shell {
        width: min(980px, 94vw);
        margin: 1.9rem auto 2rem;
      }

      .agreement-sign {
        border-radius: 14px;
        padding: 1rem 0.9rem;
      }

      .agreement-hero {
        margin-bottom: 0.95rem;
      }

      .agreement-hero .subtitle,
      .agreement-sign-note {
        font-size: 0.95rem;
        line-height: 1.45;
      }

      .agreement-form {
        gap: 0.8rem;
      }

      .agreement-form label {
        font-size: 0.92rem;
      }

      .agreement-form input[type="text"],
      .agreement-form input[type="date"] {
        font-size: 16px;
        padding: 0.72rem 0.78rem;
      }

      .agreement-submit {
        width: 100%;
        padding: 0.76rem 1rem;
      }
    }

    @media (max-width: 430px) {
      .agreement-shell {
        margin-top: 1.4rem;
      }

      .agreement-hero h1 {
        font-size: clamp(1.45rem, 7.8vw, 1.9rem);
      }

    }
  </style>
</head>
<body>
  <main class="agreement-shell">
    <section class="agreement-sign">
      <header class="agreement-hero">
        <h1><span class="gold">Congratulations</span>, you have qualified to be a mentee!</h1>
        <p class="subtitle">
          Please review the agreement
          <a
            class="agreement-inline-link"
            id="open-agreement-popup"
            href="/mentee-agreement-popup"
            target="_blank"
            rel="noopener"
          >
            here
          </a>.
        </p>
      </header>

      <p class="agreement-sign-note">By signing below, you agree to all terms in the Mentee Agreement.</p>
      <p class="field-error" id="agreement-open-error" aria-live="polite"></p>

      <form
        class="agreement-form"
        id="mentee-agreement-form"
        name="mentee-agreement"
        method="POST"
        data-netlify="true"
        netlify-honeypot="bot-field"
        action="/mentee-agreement-submitted"
      >
        <input type="hidden" name="form-name" value="mentee-agreement" />
        <input type="hidden" name="agreement_version" value="v1.1 (27/05/2026)" />
        <input type="hidden" name="signature" id="signature-value" />

        <p class="honeypot">
          <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
        </p>

        <div>
          <label for="full-name">Full Name (required)</label>
          <input type="text" id="full-name" name="full_name" autocomplete="name" required />
        </div>

        <div>
          <label for="signature-typed">Signature (required)</label>
          <input type="text" id="signature-typed" autocomplete="off" placeholder="Type your full name as your signature" />
          <p class="field-error" id="signature-error" aria-live="polite"></p>
        </div>

        <div>
          <label for="agreement-date">Date (required)</label>
          <input type="date" id="agreement-date" name="date_signed" required />
        </div>

        <label class="agreement-check">
          <input type="checkbox" name="agreement_acknowledgement" required />
          <span>I have read, understood, and agree to the Mentee Agreement</span>
        </label>

        <div class="card-section">
          <label class="card-section-title" for="card-element">Save your payment method (required)</label>
          <div id="card-element"></div>
          <p class="field-error" id="card-error" aria-live="polite"></p>
          <p class="card-trust">You're not being charged today. Your card is stored securely by Stripe, and we only charge after each session is delivered.</p>
        </div>

        <input type="hidden" name="stripe_customer_id" id="stripe-customer-id" />

        <button class="agreement-submit" id="agreement-submit-btn" type="submit">Submit Agreement</button>
      </form>
    </section>
  </main>

  <script>
    (function () {
      const STRIPE_PUBLISHABLE_KEY = "pk_live_51TbWp6FRghgIGbjs0S6iTSuAWLcYALlUhfpmO6gJpqUIpBlz2JQ97k6diZjKopq8DGySNDPDRD8zIZMXs2OLi0HO00zDKvk0pD";

      const popupTrigger = document.getElementById("open-agreement-popup");
      const agreementOpenError = document.getElementById("agreement-open-error");
      let agreementWasOpened = false;
      if (popupTrigger) {
        const markAgreementOpened = () => {
          agreementWasOpened = true;
          if (agreementOpenError) agreementOpenError.textContent = "";
        };

        popupTrigger.addEventListener("click", (event) => {
          markAgreementOpened();

          const isModifiedClick = event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button === 1;
          if (isModifiedClick) return;

          const isMobileViewport = window.matchMedia("(max-width: 768px)").matches;
          if (isMobileViewport) return;

          event.preventDefault();
          const maxWidth = Math.max(360, window.screen.availWidth - 24);
          const maxHeight = Math.max(520, window.screen.availHeight - 24);
          const width = Math.min(maxWidth, Math.max(560, Math.round(window.screen.availWidth * 0.55)));
          const height = Math.min(maxHeight, Math.max(640, Math.round(window.screen.availHeight * 0.86)));
          const left = Math.max(0, Math.round((window.screen.availWidth - width) / 2));
          const top = Math.max(0, Math.round((window.screen.availHeight - height) / 2));
          const features = `popup=yes,width=${width},height=${height},left=${left},top=${top},resizable=yes,scrollbars=yes`;
          const popup = window.open(popupTrigger.href, "headstartMenteeAgreementPopup", features);
          if (popup && !popup.closed) {
            popup.focus();
          } else {
            window.open(popupTrigger.href, "_blank", "noopener");
          }
        });

        popupTrigger.addEventListener("auxclick", (event) => {
          if (event.button === 1) markAgreementOpened();
        });
        popupTrigger.addEventListener("contextmenu", markAgreementOpened);
      }

      const form = document.getElementById("mentee-agreement-form");
      if (!form) return;

      const dateField = document.getElementById("agreement-date");
      if (dateField && !dateField.value) {
        const now = new Date();
        const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
        dateField.value = local.toISOString().split("T")[0];
      }

      const signatureValue = document.getElementById("signature-value");
      const typedField = document.getElementById("signature-typed");
      const errorField = document.getElementById("signature-error");
      const cardErrorField = document.getElementById("card-error");
      const submitBtn = document.getElementById("agreement-submit-btn");
      const customerIdField = document.getElementById("stripe-customer-id");

      const stripe = window.Stripe ? window.Stripe(STRIPE_PUBLISHABLE_KEY) : null;
      let cardElement = null;
      if (stripe) {
        const elements = stripe.elements();
        cardElement = elements.create("card", {
          style: {
            base: {
              fontSize: "16px",
              color: "#ffffff",
              fontFamily: '"Segoe UI", Arial, sans-serif',
              "::placeholder": { color: "rgba(255,255,255,0.5)" },
              iconColor: "#f7d37d",
            },
            invalid: { color: "#ffb6b6", iconColor: "#ffb6b6" },
          },
        });
        cardElement.mount("#card-element");
        cardElement.on("change", (event) => {
          if (cardErrorField) cardErrorField.textContent = event.error ? event.error.message : "";
        });
      } else if (cardErrorField) {
        cardErrorField.textContent = "Payment form failed to load. Please refresh and try again.";
      }

      let isSubmitting = false;

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (isSubmitting) return;

        if (!agreementWasOpened) {
          if (agreementOpenError) agreementOpenError.textContent = "Please open the agreement by clicking \"here\" before submitting.";
          if (popupTrigger) popupTrigger.focus();
          return;
        }

        if (errorField) errorField.textContent = "";
        if (cardErrorField) cardErrorField.textContent = "";

        const validSignature = (typedField.value || "").trim();
        if (!validSignature) {
          if (errorField) errorField.textContent = "Please type your signature before submitting.";
          typedField.focus();
          return;
        }
        signatureValue.value = validSignature;

        if (!stripe || !cardElement) {
          if (cardErrorField) cardErrorField.textContent = "Payment form is not ready. Please refresh and try again.";
          return;
        }

        const fullName = (document.getElementById("full-name").value || "").trim();
        if (!fullName) return;

        isSubmitting = true;
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.textContent = "Saving...";
        }

        try {
          const setupRes = await fetch("/.netlify/functions/create-stripe-setup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name: fullName }),
          });

          const setupData = await setupRes.json();
          if (!setupRes.ok || !setupData.client_secret) {
            throw new Error(setupData.error || "Could not start payment setup");
          }

          const confirmResult = await stripe.confirmCardSetup(setupData.client_secret, {
            payment_method: {
              card: cardElement,
              billing_details: { name: fullName },
            },
          });

          if (confirmResult.error) {
            throw new Error(confirmResult.error.message);
          }

          if (customerIdField) customerIdField.value = setupData.customer_id;
          form.submit();
        } catch (err) {
          isSubmitting = false;
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.textContent = "Submit Agreement";
          }
          if (cardErrorField) cardErrorField.textContent = err.message || "Could not save your card. Please try again.";
        }
      });
    })();
  </script>
</body>
</html>
