<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Mentee Agreement Submitted</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: "Segoe UI", Arial, sans-serif;
      padding: 1.2rem;
    }

    .confirm-box {
      width: min(560px, 94vw);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      padding: 1.4rem 1.2rem;
      text-align: center;
    }

    .confirm-box h1 {
      margin: 0 0 0.55rem;
      font-size: clamp(1.3rem, 3.6vw, 1.8rem);
    }

    .confirm-box p {
      margin: 0;
      color: rgba(255,255,255,0.82);
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <main class="confirm-box">
    <h1>Agreement submitted</h1>
    <p>Your Mentee Agreement has been submitted successfully.</p>
  </main>
</body>
</html>
